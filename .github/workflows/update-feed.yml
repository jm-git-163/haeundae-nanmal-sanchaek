# 매일 21개 공공기관 게시판을 훑어 data/feed.json 을 갱신하고,
# 바뀐 게 있으면 그대로 main 에 커밋한 뒤 Vercel 배포를 깨운다.
#
# ※ tools/collect.mjs → tools/promote.mjs 가 실제로 쓰는 파이프라인입니다.
#   (예전에 있던 build_feed.mjs 는 시험 단계 초안이라 여기서 부르지 않습니다)
name: 해운대 정보 피드 갱신

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 게시판 훑기(수집)
        run: node tools/collect.mjs --all

      - name: 선별·분류해 피드에 싣기
        run: node tools/promote.mjs

      - name: AI 쉬운말 변환(선택 — 키가 있을 때만)
        if: ${{ env.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node tools/ai_simplify.mjs

      - name: 바뀐 점이 있으면 main 에 바로 커밋
        run: |
          git config user.name "haeundae-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/feed.json
          git diff --cached --quiet && echo "변경 없음" || git commit -m "chore(feed): 해운대 정보 자동 갱신 $(date +%Y-%m-%d)"
          git push

      - name: Vercel 배포 깨우기
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
