# 매일 공식 소스를 수집·가공해 data/feed.json 을 갱신한다.
# (사람 검수: 자동 커밋 대신 PR 로 올려 승인 후 병합하도록 구성)
name: 해운대 정보 피드 갱신

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write
  pull-requests: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm i @anthropic-ai/sdk
      - name: 피드 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUSAN_SERVICE_KEY: ${{ secrets.BUSAN_SERVICE_KEY }}
          # REVIEW 은 넣지 않는다 → 새 항목은 pending 으로만 표시되고,
          # 검수자가 확인해 승인(REVIEW=1 로 재생성 또는 수동 편집)한다.
        run: node tools/build_feed.mjs
      - name: 변경분 PR 로 올리기(검수 후 병합)
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(feed): 정보 피드 자동 갱신"
          branch: feed/auto-update
          title: "해운대 정보 피드 갱신 (검수 필요)"
          body: "공식 소스에서 자동 수집·가공했습니다. 정확성(수치·자격·날짜)을 확인한 뒤 병합하세요."
          add-paths: data/feed.json
